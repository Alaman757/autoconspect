name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Скачиваем код
        uses: actions/checkout@v4

      - name: Устанавливаем Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Устанавливаем зависимости
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Принимаем лицензии Android SDK
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/repositories.cfg
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;33.0.2" "platforms;android-33" || true

      - name: Собираем APK
        run: buildozer android debug

      - name: Сохраняем APK
        uses: actions/upload-artifact@v4
        with:
          name: autoconspect-apk
          path: bin/*.apk
